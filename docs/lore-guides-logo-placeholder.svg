<svg width="400" height="280" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Lore Guides — Placeholder Logo -->
  <!-- The Waymark: two overlapping diamonds forming a compass star -->
  
  <!-- Waymark mark centered -->
  <g transform="translate(200, 80)">
    <!-- Vertical diamond -->
    <path d="M0 -40 L3.6 0 L0 40 L-3.6 0 Z" 
          stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
    <!-- Horizontal diamond -->
    <path d="M-40 0 L0 -3.6 L40 0 L0 3.6 Z" 
          stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="1.2" fill="#2D2A26" opacity="0.65"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="162" text-anchor="middle" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="26" fill="#2D2A26" letter-spacing="0.1em" 
        font-weight="400">Lore Guides</text>

  <!-- Tagline -->
  <text x="200" y="190" text-anchor="middle" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="13" fill="#9C8E7C" font-style="italic">Your places, your words.</text>

  <!-- Divider -->
  <line x1="168" y1="210" x2="232" y2="210" stroke="#E8E4DF" stroke-width="0.75"/>
  <circle cx="200" cy="210" r="1.8" fill="#C17C4E" opacity="0.6"/>

  <!-- Placeholder label -->
  <text x="200" y="238" text-anchor="middle" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="9" fill="#9C8E7C" letter-spacing="0.15em">PLACEHOLDER · NOT FINAL</text>
</svg>
